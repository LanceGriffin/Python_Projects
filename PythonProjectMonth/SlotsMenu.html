<!--This will be the Main Menu for the slots -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots Menu</title>
    <link rel="stylesheet" href="SlotsMenu.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to Slots!</h1>
        <p>Here you can play the slot machine and get a chance to win big!</p>

        <div class="button-group">
            <button id="playBtn">Play Slots</button>
            <button onclick="location.href='MainMenu.html'">Return to Main Menu</button>
            <button onclick="location.href='QuitMenu.html'">Quit Game</button>
        </div>
        <script>
            // when running under the Flask server, clicking this will call /play and
            // replace the page contents with the response. The Python game is started
            // in a separate process. If the page was opened normally in a browser
            // without the backend present, the fetch will fail silently.
            document.getElementById('playBtn').addEventListener('click', function() {
                // open the play endpoint in a new tab/window so the server can respond
                // with a status page and the existing menu can be closed.
                window.open('/play', '_blank');
                // original window may or may not be allowed to close; this will
                // succeed only if the page was opened via script (e.g. by server
                // using webbrowser.open). If it fails, the user can manually close.
                window.close();
            });
        </script>
    </div>
</body>
</html>

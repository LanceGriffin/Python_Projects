<!--This will be the Main Menu for the slots -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots Menu</title>
    <link rel="stylesheet" href="SlotsMenu.css">
    <script defer src="SlotsMenu.js"></script>
</head>
<body>
    <div class="container" role="main" aria-labelledby="title">
        <h1 id="title">Slot Machine</h1>
        <p>Use the buttons below or Arrow Up/Down to navigate.</p>
        <div class="button-group" role="menu" aria-label="Main menu">
            <button id="PlayButton" role="menuitem" aria-label="Play">Play</button>
            <button id="RulesButton" role="menuitem" aria-label="Rules">Rules</button>
            <button id="CreditsButton" role="menuitem" aria-label="Credits">Credits</button>
            <button id="ExitButton" role="menuitem" aria-label="Exit">Exit</button>
        </div>
    </div>

    <py-scripts src="./SlotsProgram.py"></py-scripts>
</body>
</html>
